[profile.default]
# Tests are marked as slow if they take more than 1 minute, terminated after 10 minutes
slow-timeout = { period = "1m", terminate-after = 20 }
# Global timeout for the entire test run. Test runs will be terminated if they take longer than this timeout.
global-timeout = "1h"
# Do not stop the test run on the first failure, but continue to run all tests.
fail-fast = false

[profile.default.junit]
# Save junit report to the project root.
path = "test-results.xml"

[test-groups]
prover-serial = { max-threads = 1 }

[[profile.default.overrides]]
# Tests in `prover.rs` rely on prover (CPU or GPU). CPU prover can take >10m to prove one batch, so we give these tests
# a longer timeout. They also need to run one at a time.
filter = 'binary(prover)'
slow-timeout = { period = "15m", terminate-after = 3 }
test-group = 'prover-serial'

[[profile.default.overrides]]
# Interop tests spin up 3 nodes (2 L2 + 1 L1) and need significant resources.
filter = 'test(~interop)'
threads-required = 4

[[profile.default.overrides]]
# External node and batch verification tests spin up 2-3 nodes.
filter = 'test(~external_node) | test(~batch_verification) | test(~upgrade)'
threads-required = 3

[[profile.default.overrides]]
# All to gateway tests spin gateway + L2 chain.
filter = 'test(~to_gateway)'
threads-required = 2

# Fast profile for local development — excludes the slowest integration tests.
# Usage: cargo nextest run -p zksync_os_integration_tests --profile fast
[profile.fast]
default-filter = 'not test(~interop) & not test(does_not_get_stuck) & not test(batch_verification_without_enough_ens) & not test(batch_verification_with_2_ens)'

# Skip slow external node tests in coverage profile
# TODO: investigate why this test gets stuck in coverage runs
# by producing 550s proving computations in coverage mode
[profile.coverage]
default-filter = 'not test(does_not_get_stuck)'
