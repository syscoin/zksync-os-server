[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read", path = "./test/fixtures" }]
allow_paths = [
    "../..",
    "../../../zksync-era/contracts/lib/openzeppelin-contracts-v4",
    "../../../zksync-era/contracts/lib/openzeppelin-contracts-upgradeable-v4",
]
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-v4/=../../../zksync-era/contracts/lib/openzeppelin-contracts-v4/contracts/",
    "@openzeppelin/contracts-upgradeable-v4/=../../../zksync-era/contracts/lib/openzeppelin-contracts-upgradeable-v4/contracts/",
    "@openzeppelin/community-contracts/=lib/openzeppelin-community-contracts/contracts/",
    "@account-abstraction/=lib/account-abstraction/contracts/",
    "contracts/=../../contracts/",
    "forge-std/=lib/forge-std/src/",
    "scripts/=../../scripts/",
]
