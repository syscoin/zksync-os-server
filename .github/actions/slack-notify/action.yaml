name: 'Slack notification'

description: 'Send a Slack notification for workflow.'

inputs:
  webhook:
    description: 'Slack Incoming Webhook URL'
    required: true
  context:
    description: 'The context of the workflow run'
    required: false
    default: 'general failure'
  title:
    description: 'Slack message title'
    required: false
    default: ''
  workflow:
    description: 'Workflow name to display'
    required: false
    default: ''
  branch:
    description: 'Branch name to display'
    required: false
    default: ''
  actor:
    description: 'Actor to display'
    required: false
    default: ''
  failed_jobs:
    description: 'Failed jobs summary'
    required: false
    default: ''
  reason:
    description: 'Analysis or summary line'
    required: false
    default: ''
  attempt:
    description: 'Workflow attempt number'
    required: false
    default: ''
  run_url:
    description: 'URL for the workflow run'
    required: false
    default: ''


runs:
  using: composite
  steps:

    - name: Slack failure notification
      uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
      with:
        webhook: ${{ inputs.webhook }}
        webhook-type: incoming-webhook
        payload: |
          blocks:
            - type: "section"
              text:
                type: "mrkdwn"
                text: "*${{ inputs.title != '' && inputs.title || format('🚨 GitHub Workflow Failed: {0}!', inputs.context) }}*"
            - type: "section"
              fields:
                - type: "mrkdwn"
                  text: "*Repository:*\n`${{ github.repository }}`"
                - type: "mrkdwn"
                  text: "*Workflow:*\n`${{ inputs.workflow != '' && inputs.workflow || github.workflow }}`"
                - type: "mrkdwn"
                  text: "*Branch:*\n`${{ inputs.branch != '' && inputs.branch || github.ref_name }}`"
                - type: "mrkdwn"
                  text: "*Triggered By:*\n`${{ inputs.actor != '' && inputs.actor || github.actor }}`"
                - type: "mrkdwn"
                  text: "*Attempt:*\n${{ inputs.attempt != '' && inputs.attempt || github.run_attempt }}"
                - type: "mrkdwn"
                  text: "*Failed Jobs:*\n`${{ inputs.failed_jobs != '' && inputs.failed_jobs || inputs.context }}`"
            - type: "section"
              text:
                type: "mrkdwn"
                text: "${{ inputs.reason != '' && format('*Analysis:* {0}', inputs.reason) || 'You can view the detailed logs and troubleshoot the issue by visiting the link below:' }}"
            - type: "actions"
              elements:
                - type: "button"
                  text:
                    type: "plain_text"
                    text: "View Workflow Logs"
                    emoji: true
                  url: "${{ inputs.run_url != '' && inputs.run_url || format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) }}"
                  style: "danger"
