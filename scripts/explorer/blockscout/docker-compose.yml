services:
  redis-db:
    image: redis:alpine
    restart: always
    command: redis-server
    volumes:
      - redis-data:/data

  db-init:
    image: postgres:17
    volumes:
      - db-data:/var/lib/postgresql/data
    entrypoint:
      - sh
      - -c
      - |
        chown -R 2000:2000 /var/lib/postgresql/data

  db:
    image: postgres:17
    user: "2000:2000"
    shm_size: 256m
    restart: always
    depends_on:
      db-init:
        condition: service_completed_successfully
    command: postgres -c 'max_connections=200' -c 'client_connection_check_interval=60000'
    environment:
      POSTGRES_DB: blockscout
      POSTGRES_USER: blockscout
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockscout -d blockscout"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: ghcr.io/blockscout/${BLOCKSCOUT_BACKEND_REPO}:${BLOCKSCOUT_BACKEND_TAG}
    pull_policy: always
    restart: always
    stop_grace_period: 5m
    depends_on:
      - db
      - redis-db
    command: sh -c "bin/blockscout eval \"Elixir.Explorer.ReleaseTasks.create_and_migrate()\" && bin/blockscout start"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://blockscout:${POSTGRES_PASSWORD}@db:5432/blockscout?ssl=false
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      MIX_ENV: prod
      ECTO_USE_SSL: "false"
      API_V2_ENABLED: "true"
      ETHEREUM_JSONRPC_VARIANT: geth
      ETHEREUM_JSONRPC_TRANSPORT: http
      ETHEREUM_JSONRPC_HTTP_URL: ${L2_RPC_URL}
      ETHEREUM_JSONRPC_TRACE_URL: ${L2_RPC_URL}
      ETHEREUM_JSONRPC_DISABLE_ARCHIVE_BALANCES: "false"
      CHAIN_TYPE: ${CHAIN_TYPE}
      CHAIN_ID: "${CHAIN_ID}"
      COIN_NAME: ${COIN_NAME}
      COIN: ${COIN_SYMBOL}
      DISABLE_EXCHANGE_RATES: "true"
      INDEXER_DISABLE_INTERNAL_TRANSACTIONS_FETCHER: "true"
    volumes:
      - backend-logs:/app/logs
      - backend-dets:/app/dets

  frontend:
    image: ghcr.io/blockscout/frontend:${BLOCKSCOUT_FRONTEND_TAG}
    pull_policy: always
    platform: linux/amd64
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_PROTOCOL: http
      NEXT_PUBLIC_API_HOST: ${PUBLIC_HOST}
      NEXT_PUBLIC_API_PORT: "${PUBLIC_PORT}"
      NEXT_PUBLIC_API_BASE_PATH: /
      NEXT_PUBLIC_APP_PROTOCOL: http
      NEXT_PUBLIC_APP_HOST: ${PUBLIC_HOST}
      NEXT_PUBLIC_APP_PORT: "${PUBLIC_PORT}"
      NEXT_PUBLIC_NETWORK_NAME: ${NETWORK_NAME}
      NEXT_PUBLIC_NETWORK_SHORT_NAME: ${NETWORK_SHORT_NAME}
      NEXT_PUBLIC_NETWORK_ID: "${CHAIN_ID}"
      NEXT_PUBLIC_NETWORK_RPC_URL: ${NEXT_PUBLIC_NETWORK_RPC_URL}
      NEXT_PUBLIC_NETWORK_CURRENCY_NAME: ${COIN_NAME}
      NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL: ${COIN_SYMBOL}
      NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS: "18"
      NEXT_PUBLIC_IS_TESTNET: "true"
      NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL: ws
      NEXT_PUBLIC_HOMEPAGE_CHARTS: ${NEXT_PUBLIC_HOMEPAGE_CHARTS}
      NEXT_PUBLIC_HOMEPAGE_HERO_BANNER_CONFIG: ${NEXT_PUBLIC_HOMEPAGE_HERO_BANNER_CONFIG}
      NEXT_PUBLIC_NETWORK_LOGO: ${NETWORK_LOGO}
      NEXT_PUBLIC_NETWORK_LOGO_DARK: ${NETWORK_LOGO_DARK}
      NEXT_PUBLIC_NETWORK_ICON: ${NEXT_PUBLIC_NETWORK_ICON}
      NEXT_PUBLIC_NETWORK_ICON_DARK: ${NEXT_PUBLIC_NETWORK_ICON_DARK}
      NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: "${NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID:-}"
      NEXT_PUBLIC_FOOTER_LINKS: ${FOOTER_LINKS}
      NEXT_PUBLIC_OTHER_LINKS: ${OTHER_LINKS}
      NEXT_PUBLIC_WEB3_WALLETS: ${NEXT_PUBLIC_WEB3_WALLETS}
      NEXT_PUBLIC_PROMOTE_BLOCKSCOUT_IN_TITLE: "false"
      NEXT_PUBLIC_HIDE_INDEXING_ALERT_INT_TXS: "true"
      FAVICON_MASTER_URL: ${FAVICON_MASTER_URL}

  proxy:
    image: nginx
    restart: always
    depends_on:
      - backend
      - frontend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      BACK_PROXY_PASS: http://backend:4000
      FRONT_PROXY_PASS: http://frontend:3000
    ports:
      - "${PUBLIC_PORT}:80"
    volumes:
      - ./proxy/explorer.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./proxy/assets:/usr/share/nginx/html/assets:ro

volumes:
  redis-data:
  db-data:
  backend-logs:
  backend-dets:
